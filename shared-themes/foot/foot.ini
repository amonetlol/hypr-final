include=~/.config/themes/foot/colors.ini
include=~/.config/themes/foot/fonts.ini

initial-window-size-chars=95x24
initial-window-mode=windowed
pad=12x12
resize-delay-ms=100

[scrollback]
lines=1000
multiplier=3.0

[url]
launch=xdg-open ${url}

[cursor]
style=block
blink=yes

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes
