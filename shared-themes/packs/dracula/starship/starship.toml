format = """
[в–‘в–’в–“](#8be9fd)\
[ пҢғ ](bg:#8be9fd fg:#282a36)\
[оӮҙ](bg:#bd93f9 fg:#8be9fd)\
$directory\
[оӮҙ](fg:#bd93f9 bg:#343746)\
$git_branch\
$git_status\
[оӮҙ](fg:#343746 bg:#21222c)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#21222c bg:#282a36)\
$time\
[оӮҙ ](fg:#282a36)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#f8f8f2 bg:#bd93f9"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#343746"
format = '[[ $symbol $branch ](fg:#bd93f9 bg:#343746)]($style)'

[git_status]
style = "bg:#343746"
format = '[[($all_status$ahead_behind )](fg:#bd93f9 bg:#343746)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#21222c"
format = '[[ $symbol ($version) ](fg:#bd93f9 bg:#21222c)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#21222c"
format = '[[ $symbol ($version) ](fg:#bd93f9 bg:#21222c)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#21222c"
format = '[[ $symbol ($version) ](fg:#bd93f9 bg:#21222c)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#21222c"
format = '[[ $symbol ($version) ](fg:#bd93f9 bg:#21222c)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#282a36"
format = '[[ пҗә $time ](fg:#6272a4 bg:#282a36)]($style)'
