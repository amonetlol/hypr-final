format = """
[в–‘в–’в–“](#7dcfff)\
[ пҢғ ](bg:#7dcfff fg:#1a1b26)\
[оӮҙ](bg:#7aa2f7 fg:#7dcfff)\
$directory\
[оӮҙ](fg:#7aa2f7 bg:#24283b)\
$git_branch\
$git_status\
[оӮҙ](fg:#24283b bg:#16161e)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#16161e bg:#1a1b26)\
$time\
[оӮҙ ](fg:#1a1b26)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#c0caf5 bg:#7aa2f7"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#24283b"
format = '[[ $symbol $branch ](fg:#7aa2f7 bg:#24283b)]($style)'

[git_status]
style = "bg:#24283b"
format = '[[($all_status$ahead_behind )](fg:#7aa2f7 bg:#24283b)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#16161e"
format = '[[ $symbol ($version) ](fg:#7aa2f7 bg:#16161e)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#16161e"
format = '[[ $symbol ($version) ](fg:#7aa2f7 bg:#16161e)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#16161e"
format = '[[ $symbol ($version) ](fg:#7aa2f7 bg:#16161e)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#16161e"
format = '[[ $symbol ($version) ](fg:#7aa2f7 bg:#16161e)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#1a1b26"
format = '[[ пҗә $time ](fg:#565f89 bg:#1a1b26)]($style)'
