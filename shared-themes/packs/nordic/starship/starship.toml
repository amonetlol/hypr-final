format = """
[в–‘в–’в–“](#8fbcbb)\
[ пҢғ ](bg:#8fbcbb fg:#2e3440)\
[оӮҙ](bg:#88c0d0 fg:#8fbcbb)\
$directory\
[оӮҙ](fg:#88c0d0 bg:#3b4252)\
$git_branch\
$git_status\
[оӮҙ](fg:#3b4252 bg:#242933)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#242933 bg:#2e3440)\
$time\
[оӮҙ ](fg:#2e3440)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#eceff4 bg:#88c0d0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#3b4252"
format = '[[ $symbol $branch ](fg:#88c0d0 bg:#3b4252)]($style)'

[git_status]
style = "bg:#3b4252"
format = '[[($all_status$ahead_behind )](fg:#88c0d0 bg:#3b4252)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#242933"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#242933)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#242933"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#242933)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#242933"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#242933)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#242933"
format = '[[ $symbol ($version) ](fg:#88c0d0 bg:#242933)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#2e3440"
format = '[[ пҗә $time ](fg:#616e88 bg:#2e3440)]($style)'
