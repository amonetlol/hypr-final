format = """
[в–‘в–’в–“](#88c0d0)\
[ пҢғ ](bg:#88c0d0 fg:#2e3440)\
[оӮҙ](bg:#81a1c1 fg:#88c0d0)\
$directory\
[оӮҙ](fg:#81a1c1 bg:#434c5e)\
$git_branch\
$git_status\
[оӮҙ](fg:#434c5e bg:#272c36)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#272c36 bg:#2e3440)\
$time\
[оӮҙ ](fg:#2e3440)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#e5e9f0 bg:#81a1c1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#434c5e"
format = '[[ $symbol $branch ](fg:#81a1c1 bg:#434c5e)]($style)'

[git_status]
style = "bg:#434c5e"
format = '[[($all_status$ahead_behind )](fg:#81a1c1 bg:#434c5e)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#272c36"
format = '[[ $symbol ($version) ](fg:#81a1c1 bg:#272c36)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#272c36"
format = '[[ $symbol ($version) ](fg:#81a1c1 bg:#272c36)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#272c36"
format = '[[ $symbol ($version) ](fg:#81a1c1 bg:#272c36)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#272c36"
format = '[[ $symbol ($version) ](fg:#81a1c1 bg:#272c36)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#2e3440"
format = '[[ пҗә $time ](fg:#4c566a bg:#2e3440)]($style)'
