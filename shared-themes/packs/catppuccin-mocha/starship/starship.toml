format = """
[в–‘в–’в–“](#94e2d5)\
[ пҢғ ](bg:#94e2d5 fg:#1e1e2e)\
[оӮҙ](bg:#89b4fa fg:#94e2d5)\
$directory\
[оӮҙ](fg:#89b4fa bg:#313244)\
$git_branch\
$git_status\
[оӮҙ](fg:#313244 bg:#181825)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#181825 bg:#1e1e2e)\
$time\
[оӮҙ ](fg:#1e1e2e)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#cdd6f4 bg:#89b4fa"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#313244"
format = '[[ $symbol $branch ](fg:#89b4fa bg:#313244)]($style)'

[git_status]
style = "bg:#313244"
format = '[[($all_status$ahead_behind )](fg:#89b4fa bg:#313244)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#181825"
format = '[[ $symbol ($version) ](fg:#89b4fa bg:#181825)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#181825"
format = '[[ $symbol ($version) ](fg:#89b4fa bg:#181825)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#181825"
format = '[[ $symbol ($version) ](fg:#89b4fa bg:#181825)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#181825"
format = '[[ $symbol ($version) ](fg:#89b4fa bg:#181825)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#1e1e2e"
format = '[[ пҗә $time ](fg:#6c7086 bg:#1e1e2e)]($style)'
