format = """
[в–‘в–’в–“](#8ec07c)\
[ пҢғ ](bg:#8ec07c fg:#282828)\
[оӮҙ](bg:#83a598 fg:#8ec07c)\
$directory\
[оӮҙ](fg:#83a598 bg:#3c3836)\
$git_branch\
$git_status\
[оӮҙ](fg:#3c3836 bg:#1d2021)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#1d2021 bg:#282828)\
$time\
[оӮҙ ](fg:#282828)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#ebdbb2 bg:#83a598"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#3c3836"
format = '[[ $symbol $branch ](fg:#83a598 bg:#3c3836)]($style)'

[git_status]
style = "bg:#3c3836"
format = '[[($all_status$ahead_behind )](fg:#83a598 bg:#3c3836)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#1d2021"
format = '[[ $symbol ($version) ](fg:#83a598 bg:#1d2021)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#1d2021"
format = '[[ $symbol ($version) ](fg:#83a598 bg:#1d2021)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#1d2021"
format = '[[ $symbol ($version) ](fg:#83a598 bg:#1d2021)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#1d2021"
format = '[[ $symbol ($version) ](fg:#83a598 bg:#1d2021)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#282828"
format = '[[ пҗә $time ](fg:#928374 bg:#282828)]($style)'
