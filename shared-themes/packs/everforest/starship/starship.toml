format = """
[в–‘в–’в–“](#83c092)\
[ пҢғ ](bg:#83c092 fg:#2d353b)\
[оӮҙ](bg:#7fbbb3 fg:#83c092)\
$directory\
[оӮҙ](fg:#7fbbb3 bg:#3d484d)\
$git_branch\
$git_status\
[оӮҙ](fg:#3d484d bg:#232a2e)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#232a2e bg:#2d353b)\
$time\
[оӮҙ ](fg:#2d353b)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#d3c6aa bg:#7fbbb3"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#3d484d"
format = '[[ $symbol $branch ](fg:#7fbbb3 bg:#3d484d)]($style)'

[git_status]
style = "bg:#3d484d"
format = '[[($all_status$ahead_behind )](fg:#7fbbb3 bg:#3d484d)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#232a2e"
format = '[[ $symbol ($version) ](fg:#7fbbb3 bg:#232a2e)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#232a2e"
format = '[[ $symbol ($version) ](fg:#7fbbb3 bg:#232a2e)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#232a2e"
format = '[[ $symbol ($version) ](fg:#7fbbb3 bg:#232a2e)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#232a2e"
format = '[[ $symbol ($version) ](fg:#7fbbb3 bg:#232a2e)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#2d353b"
format = '[[ пҗә $time ](fg:#859289 bg:#2d353b)]($style)'
