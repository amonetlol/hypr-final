format = """
[в–‘в–’в–“](#99d1db)\
[ пҢғ ](bg:#99d1db fg:#303446)\
[оӮҙ](bg:#8caaee fg:#99d1db)\
$directory\
[оӮҙ](fg:#8caaee bg:#414559)\
$git_branch\
$git_status\
[оӮҙ](fg:#414559 bg:#292c3c)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#292c3c bg:#303446)\
$time\
[оӮҙ ](fg:#303446)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#c6d0f5 bg:#8caaee"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#414559"
format = '[[ $symbol $branch ](fg:#8caaee bg:#414559)]($style)'

[git_status]
style = "bg:#414559"
format = '[[($all_status$ahead_behind )](fg:#8caaee bg:#414559)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#292c3c"
format = '[[ $symbol ($version) ](fg:#8caaee bg:#292c3c)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#292c3c"
format = '[[ $symbol ($version) ](fg:#8caaee bg:#292c3c)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#292c3c"
format = '[[ $symbol ($version) ](fg:#8caaee bg:#292c3c)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#292c3c"
format = '[[ $symbol ($version) ](fg:#8caaee bg:#292c3c)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#303446"
format = '[[ пҗә $time ](fg:#737994 bg:#303446)]($style)'
