format = """
[в–‘в–’в–“](#7aa89f)\
[ пҢғ ](bg:#7aa89f fg:#1f1f28)\
[оӮҙ](bg:#7e9cd8 fg:#7aa89f)\
$directory\
[оӮҙ](fg:#7e9cd8 bg:#2a2a37)\
$git_branch\
$git_status\
[оӮҙ](fg:#2a2a37 bg:#16161d)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#16161d bg:#1f1f28)\
$time\
[оӮҙ ](fg:#1f1f28)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#dcd7ba bg:#7e9cd8"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#2a2a37"
format = '[[ $symbol $branch ](fg:#7e9cd8 bg:#2a2a37)]($style)'

[git_status]
style = "bg:#2a2a37"
format = '[[($all_status$ahead_behind )](fg:#7e9cd8 bg:#2a2a37)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#16161d"
format = '[[ $symbol ($version) ](fg:#7e9cd8 bg:#16161d)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#16161d"
format = '[[ $symbol ($version) ](fg:#7e9cd8 bg:#16161d)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#16161d"
format = '[[ $symbol ($version) ](fg:#7e9cd8 bg:#16161d)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#16161d"
format = '[[ $symbol ($version) ](fg:#7e9cd8 bg:#16161d)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#1f1f28"
format = '[[ пҗә $time ](fg:#727169 bg:#1f1f28)]($style)'
