format = """
[в–‘в–’в–“](#56b6c2)\
[ пҢғ ](bg:#56b6c2 fg:#282c34)\
[оӮҙ](bg:#61afef fg:#56b6c2)\
$directory\
[оӮҙ](fg:#61afef bg:#2c323c)\
$git_branch\
$git_status\
[оӮҙ](fg:#2c323c bg:#21252b)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#21252b bg:#282c34)\
$time\
[оӮҙ ](fg:#282c34)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#abb2bf bg:#61afef"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#2c323c"
format = '[[ $symbol $branch ](fg:#61afef bg:#2c323c)]($style)'

[git_status]
style = "bg:#2c323c"
format = '[[($all_status$ahead_behind )](fg:#61afef bg:#2c323c)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#21252b"
format = '[[ $symbol ($version) ](fg:#61afef bg:#21252b)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#21252b"
format = '[[ $symbol ($version) ](fg:#61afef bg:#21252b)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#21252b"
format = '[[ $symbol ($version) ](fg:#61afef bg:#21252b)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#21252b"
format = '[[ $symbol ($version) ](fg:#61afef bg:#21252b)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#282c34"
format = '[[ пҗә $time ](fg:#5c6370 bg:#282c34)]($style)'
