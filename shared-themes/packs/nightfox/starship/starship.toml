format = """
[в–‘в–’в–“](#70a5b2)\
[ пҢғ ](bg:#70a5b2 fg:#192330)\
[оӮҙ](bg:#719cd6 fg:#70a5b2)\
$directory\
[оӮҙ](fg:#719cd6 bg:#212f3b)\
$git_branch\
$git_status\
[оӮҙ](fg:#212f3b bg:#121922)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#121922 bg:#192330)\
$time\
[оӮҙ ](fg:#192330)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#cdcecf bg:#719cd6"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#212f3b"
format = '[[ $symbol $branch ](fg:#719cd6 bg:#212f3b)]($style)'

[git_status]
style = "bg:#212f3b"
format = '[[($all_status$ahead_behind )](fg:#719cd6 bg:#212f3b)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#121922"
format = '[[ $symbol ($version) ](fg:#719cd6 bg:#121922)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#121922"
format = '[[ $symbol ($version) ](fg:#719cd6 bg:#121922)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#121922"
format = '[[ $symbol ($version) ](fg:#719cd6 bg:#121922)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#121922"
format = '[[ $symbol ($version) ](fg:#719cd6 bg:#121922)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#192330"
format = '[[ пҗә $time ](fg:#71839b bg:#192330)]($style)'
