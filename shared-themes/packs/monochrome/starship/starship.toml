format = """
[в–‘в–’в–“](#aaaaaa)\
[ пҢғ ](bg:#aaaaaa fg:#1e1e1e)\
[оӮҙ](bg:#9e9e9e fg:#aaaaaa)\
$directory\
[оӮҙ](fg:#9e9e9e bg:#2d2d2d)\
$git_branch\
$git_status\
[оӮҙ](fg:#2d2d2d bg:#151515)\
$nodejs\
$rust\
$golang\
$php\
[оӮҙ](fg:#151515 bg:#1e1e1e)\
$time\
[оӮҙ ](fg:#1e1e1e)\
$character"""

scan_timeout = 200
command_timeout = 5000

[directory]
style = "fg:#d4d4d4 bg:#9e9e9e"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "п…ң "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Desktop" = "п„Ҳ "
"~" = "пҖ• "
"CPP" = "оҷҶ "
"Cpp" = "оҷҶ "
"C++" = "оҷҶ "
"c++" = "оҷҶ "
"cpp" = "оҷҶ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#2d2d2d"
format = '[[ $symbol $branch ](fg:#9e9e9e bg:#2d2d2d)]($style)'

[git_status]
style = "bg:#2d2d2d"
format = '[[($all_status$ahead_behind )](fg:#9e9e9e bg:#2d2d2d)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#151515"
format = '[[ $symbol ($version) ](fg:#9e9e9e bg:#151515)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#151515"
format = '[[ $symbol ($version) ](fg:#9e9e9e bg:#151515)]($style)'

[golang]
symbol = "пі‘"
style = "bg:#151515"
format = '[[ $symbol ($version) ](fg:#9e9e9e bg:#151515)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#151515"
format = '[[ $symbol ($version) ](fg:#9e9e9e bg:#151515)]($style)'

[time]
disabled = true
time_format = "%R"
style = "bg:#1e1e1e"
format = '[[ пҗә $time ](fg:#6e6e6e bg:#1e1e1e)]($style)'
