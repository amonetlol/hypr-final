# Hyprlock — Style 7 (PT-BR), 0xProto, wallpaper from ~/Imagens/wallpapers/hyprlock.jpg

background {
    monitor =
    path = ~/Imagens/wallpapers/hyprlock.jpg
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = rgba(255, 255, 255, 1)
    font_size = 125
    font_family = 0xProto Nerd Font Propo
    position = -80, 190
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = rgba(147, 196, 255, 1)
    font_size = 125
    font_family = 0xProto Nerd Font Propo
    position = 0, 70
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=pt_BR.UTF-8 date +"%d %B, %a.")"
    color = rgba(255, 255, 255, 100)
    font_size = 22
    font_family = 0xProto Nerd Font Propo
    position = 20, -8
    halign = center
    valign = center
}

label {
    monitor =
    text =     $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    font_size = 22
    font_family = 0xProto Nerd Font Propo
    position = 0, -220
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = 0xProto Nerd Font Propo
    placeholder_text = <i><span foreground="##ffffff99">🔒 Digite a senha</span></i>
    hide_input = false
    position = 0, -290
    halign = center
    valign = center
}
